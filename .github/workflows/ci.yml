name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Syntax check
        run: |
          # avoid installing heavy native deps (pyosmium, geopandas build deps) in CI
          # keep a fast syntax-only check
          python -m compileall src
